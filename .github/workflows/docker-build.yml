name: Build & Push Docker Images

# ─── Trigger ──────────────────────────────────────────────────────────────────
# Every push to main goes through this workflow.
# What actually happens depends on whether changeset files are present (see below).
on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

# push uses refs/heads/main; pull_request uses refs/pull/N/merge — different github.ref
# would split concurrency and allow parallel runs (race on changesets). Single group
# serializes all triggers that touch this workflow for this repo.
concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-main
  cancel-in-progress: false  # don't cancel — let the first run finish cleanly

# changesets/action needs these to open and push the Version Packages PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Step 1: Changesets gate ──────────────────────────────────────────────
  #
  # This job has two distinct behaviours depending on what landed on main:
  #
  #   A) A regular dev→main merge that includes .changeset/*.md files
  #      → changesets/action bumps versions in package.json files, opens
  #        (or updates) a "Version Packages" PR, and stops. No Docker build.
  #
  #   B) The "Version Packages" PR itself is merged
  #      → commit message starts with "Version Packages" (set by changesets)
  #      → changesets/action has nothing to do, build jobs are unlocked.
  #
  # Scenario B: merged Version Packages PR (title check), OR push whose head commit
  # message is that merge (squash title → commit subject). `merged == true` false on
  # plain push → && short-circuits; no need to branch on github.event_name.
  # ──────────────────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    # Closed PR without merge: no changesets/Docker work; skip job (and downstream).
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    outputs:
      is-version-pr: ${{ (github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'Version Packages')) || startsWith(github.event.head_commit.message, 'Version Packages') }}
    steps:
      - uses: actions/checkout@v6
        with:
          # changesets needs full history to diff against the base branch
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --immutable

      - uses: changesets/action@v1
        id: changesets
        with:
          version: yarn changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Step 2: Build & push images (only after Version Packages lands on main) ─
  # Runs both images in parallel matrix legs. Comment above still applies: gate is
  # version-package merge, not per-package diff (both tags bump together today).
  build-images:
    needs: release
    if: needs.release.outputs.is-version-pr == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: backend
            context: apps/backend
            image: presenterkit/backend
            pkg: apps/backend/package.json
          - slug: pdf2img
            context: apps/pdf2img
            image: presenterkit/pdf2img
            pkg: apps/pdf2img/package.json
    steps:
      - uses: actions/checkout@v6

      - name: Read version (${{ matrix.slug }})
        id: version
        run: |
          VERSION=$(node -p "require('./${{ matrix.pkg }}').version")
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.slug }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.full }}
            ${{ matrix.image }}:${{ steps.version.outputs.major }}
            ${{ matrix.image }}:latest
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
